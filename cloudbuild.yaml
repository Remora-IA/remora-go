steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [build, -f, remora-flujo/Dockerfile, -t, 'gcr.io/$PROJECT_ID/flujo-api:latest', .]
  - name: 'gcr.io/cloud-builders/docker'
    args: [push, 'gcr.io/$PROJECT_ID/flujo-api:latest']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - flujo-api
      - --image=gcr.io/$PROJECT_ID/flujo-api:latest
      - --region=us-central1
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --project=$PROJECT_ID
images: ['gcr.io/$PROJECT_ID/flujo-api']
options:
  logging: CLOUD_LOGGING_ONLY
