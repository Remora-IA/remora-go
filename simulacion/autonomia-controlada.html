<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente de cobranza — Simulación</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f7;
    --white: #ffffff;
    --surface: #f9f9fb;
    --border: #e8e8ed;
    --border-light: #f0f0f4;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-muted: #aeaeb2;
    --accent: #7c3aed;
    --accent-light: #ede9fe;
    --bar-fill: #d1d1d6;
    --bar-dark: #8e8e93;
    --sidebar-w: 320px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}

  /* ── Context sidebar ── */
  .context-sidebar{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--border);padding:18px 14px;overflow-y:auto;flex-shrink:0;}
  .ctx-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .ctx-orb{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c4b5fd,#7c3aed 50%,#5b21b6);}
  .ctx-title{font-size:13px;font-weight:700;color:var(--text);}
  .ctx-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .ctx-section{margin-bottom:14px;padding:12px;border:1px solid var(--border);border-radius:12px;background:var(--white);}
  .ctx-section h4{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:10px;}
  .ctx-table{width:100%;border-collapse:collapse;font-size:12px;}
  .ctx-table td{padding:6px 0;border-bottom:1px solid var(--border-light);color:var(--text-secondary);vertical-align:top;}
  .ctx-table tr:last-child td{border-bottom:none;}
  .ctx-table .val{font-weight:600;color:var(--text);text-align:right;padding-left:10px;}
  .ctx-mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
  .ctx-mini-card{padding:10px;border-radius:10px;background:var(--surface);border:1px solid var(--border-light);}
  .ctx-mini-card .n{font-size:18px;font-weight:800;color:var(--text);}
  .ctx-mini-card .l{font-size:10px;color:var(--text-muted);margin-top:2px;}
  .ctx-list{display:flex;flex-direction:column;gap:8px;}
  .ctx-line{font-size:12px;color:var(--text-secondary);line-height:1.5;padding:8px 10px;background:var(--surface);border-radius:8px;border:1px solid var(--border-light);}
  .ctx-line strong{color:var(--text);}
  .ctx-foot{font-size:11px;color:var(--text-muted);line-height:1.5;}

  /* ── Main ── */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

  /* ── Topbar ── */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border);background:var(--white);flex-shrink:0;height:50px;}
  .topbar-left{display:flex;align-items:center;gap:6px;}
  .model-sel{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;background:var(--white);}
  .model-sel:hover{background:var(--surface);}
  .model-sel .ms-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:6px;}
  .tb-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;background:var(--white);font-family:inherit;}
  .tb-btn:hover{background:var(--surface);}
  .tb-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .tb-btn.dark{background:var(--text);color:#fff;border-color:var(--text);}
  .state-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-right:6px;}
  .state-badge.idle{background:var(--surface);color:var(--text-muted);}
  .state-badge.analyzing{background:var(--accent-light);color:var(--accent);}
  .state-badge.done{background:var(--surface);color:var(--text-muted);}

  /* ── Welcome screen ── */
  .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:0;}
  .welcome .orb{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c4b5fd,#7c3aed 50%,#5b21b6);box-shadow:0 8px 30px rgba(124,58,237,.25);margin-bottom:28px;}
  .welcome h2{font-size:32px;font-weight:700;color:var(--text);text-align:center;line-height:1.3;}
  .welcome h2 span{color:var(--accent);}
  .welcome-input{margin-top:28px;width:100%;max-width:560px;}
  .welcome-box{border:1px solid var(--border);border-radius:14px;background:var(--white);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .welcome-box textarea{width:100%;border:none;outline:none;padding:16px 18px 10px;font-size:14px;font-family:inherit;color:var(--text);resize:none;min-height:44px;background:transparent;}
  .welcome-box textarea::placeholder{color:var(--text-muted);}
  .welcome-box-footer{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 8px;}
  .welcome-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:500;color:var(--text-secondary);cursor:pointer;background:var(--white);font-family:inherit;}
  .welcome-chip .chip-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;}
  .send-btn{width:28px;height:28px;border-radius:6px;border:none;background:var(--text-muted);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .send-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;}
  .welcome-examples{margin-top:24px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:600px;}
  .we-card{padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--white);font-size:13px;color:var(--text-secondary);cursor:pointer;transition:all .15s;min-width:140px;flex:1;max-width:180px;}
  .we-card:hover{border-color:var(--accent);color:var(--text);}
  .we-card .we-icon{font-size:16px;margin-top:8px;color:var(--text-muted);}

  /* ── Chat area ── */
  .chat-view{flex:1;display:none;flex-direction:column;overflow:hidden;}
  .chat-view.visible{display:flex;}
  .chat-scroll{flex:1;overflow-y:auto;}
  .chat-inner{max-width:740px;width:100%;margin:0 auto;padding:20px 28px;}
  .owner-banner{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;font-size:11px;font-weight:600;margin-bottom:16px;}
  .owner-banner .dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .owner-banner.active{background:var(--accent-light);color:var(--accent);}
  .owner-banner.active .dot{background:var(--accent);}
  .owner-banner.idle{background:var(--surface);color:var(--text-muted);}
  .owner-banner.idle .dot{background:var(--text-muted);}

  /* Messages */
  .msg{margin-bottom:20px;animation:msgIn .25s ease;}
  @keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .msg-header{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
  .msg-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
  .msg-avatar.ai{background:var(--accent);}
  .msg-avatar.user{background:var(--text-muted);}
  .msg-name{font-size:13px;font-weight:600;color:var(--text);display:none;}
  .msg-body{padding-left:31px;font-size:14px;line-height:1.7;color:var(--text-secondary);}
  .msg-body strong{color:var(--text);}
  .msg.user-msg .msg-body{padding-left:0;text-align:right;}
  .msg.user-msg .msg-header{justify-content:flex-end;}
  .msg.user-msg .user-bubble{display:inline-block;background:var(--white);border:1px solid var(--border);border-radius:14px 14px 4px 14px;padding:8px 16px;font-size:14px;color:var(--text);text-align:left;max-width:420px;}

  /* Analysis card */
  .a-card{margin-top:14px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--white);}
  .a-card-h{padding:9px 14px;font-size:12px;font-weight:600;border-bottom:1px solid var(--border-light);color:var(--text);background:var(--surface);display:flex;align-items:center;gap:6px;}
  .a-card-b{padding:14px;}

  /* Score */
  .score-row{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
  .score-num{width:56px;height:56px;border-radius:50%;background:var(--text);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0;position:relative;}
  .score-num .sn-sub{position:absolute;bottom:-2px;font-size:8px;font-weight:700;padding:1px 6px;border-radius:8px;background:var(--text-secondary);color:#fff;}
  .score-meta{flex:1;}
  .score-meta .sm-title{font-size:14px;font-weight:700;color:var(--text);}
  .score-meta .sm-desc{font-size:11px;color:var(--text-muted);margin-top:1px;}

  /* Bars */
  .bar-row{display:flex;align-items:center;margin-bottom:6px;gap:8px;}
  .bar-label{width:130px;font-size:11px;color:var(--text-muted);flex-shrink:0;text-align:right;font-weight:500;}
  .bar-track{flex:1;height:16px;background:var(--surface);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;background:var(--bar-fill);transition:width .5s ease;display:flex;align-items:center;padding-left:6px;font-size:9px;font-weight:600;color:var(--text-secondary);}
  .bar-fill.dark{background:var(--bar-dark);color:#fff;}
  .bar-fill.accent{background:var(--accent);color:#fff;}
  .bar-value{font-size:11px;font-weight:600;color:var(--text);width:50px;text-align:right;flex-shrink:0;}

  /* Data table */
  .d-table{width:100%;border-collapse:collapse;margin:6px 0;font-size:12px;}
  .d-table th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);padding:6px 8px;border-bottom:1px solid var(--border);font-weight:700;}
  .d-table td{padding:7px 8px;border-bottom:1px solid var(--border-light);color:var(--text-secondary);}
  .d-table tr:last-child td{border-bottom:none;}
  .d-table .val{font-weight:600;color:var(--text);}
  .tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;background:var(--surface);color:var(--text-secondary);}
  .tag.alert{background:#fef2f2;color:#991b1b;}

  /* Metric grid */
  .m-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin:8px 0;}
  .m-card{padding:10px;border-radius:8px;background:var(--surface);text-align:center;border:1px solid var(--border-light);}
  .m-card .mv{font-size:20px;font-weight:800;color:var(--text);}
  .m-card .ml{font-size:10px;color:var(--text-muted);margin-top:2px;}

  /* Sufficiency */
  .suf{margin-top:12px;font-size:11px;display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--surface);border-radius:6px;}
  .suf .suf-l{font-weight:600;white-space:nowrap;color:var(--text-secondary);}
  .suf .suf-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;max-width:160px;}
  .suf .suf-fill{height:100%;border-radius:2px;background:var(--bar-dark);transition:width .4s;}
  .suf .suf-p{font-weight:700;color:var(--text);}

  /* Bottom */
  .bottom-area{padding:0 28px 16px;max-width:740px;width:100%;margin:0 auto;}
  .action-strip{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
  .action-strip .label{font-size:10px;color:var(--text-muted);font-weight:600;margin-right:2px;}
  .action-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--text-secondary);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;font-weight:500;}
  .action-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .action-btn.primary{background:var(--text);color:#fff;border-color:var(--text);font-weight:600;}
  .action-btn.primary:hover{opacity:.85;}
  .action-btn.muted{color:var(--text-muted);border-color:var(--border-light);}
  .action-btn.muted:hover{color:var(--text-secondary);background:var(--surface);}
  .input-box{border:1px solid var(--border);border-radius:14px;background:var(--white);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.03);}
  .input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,58,237,.08);}
  .input-box textarea{width:100%;border:none;outline:none;padding:14px 16px 6px;font-size:14px;font-family:inherit;color:var(--text);resize:none;min-height:40px;background:transparent;}
  .input-box textarea::placeholder{color:var(--text-muted);}
  .input-box-f{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 8px;}
  .ib-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:500;color:var(--text-secondary);cursor:pointer;background:var(--white);font-family:inherit;}
  .ib-chip .chip-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;}

  /* Right panel */
  .right-panel{width:220px;border-left:1px solid var(--border);background:var(--white);padding:16px 12px;overflow-y:auto;flex-shrink:0;font-size:11px;}
  .right-panel h4{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px;font-weight:700;}
  .rp-node{padding:6px 8px;border-radius:6px;margin-bottom:3px;border:1px solid transparent;color:var(--text-muted);font-size:11px;}
  .rp-node.active{border-color:var(--accent-light);background:var(--accent-light);color:var(--accent);font-weight:600;}
  .rp-subs{padding-left:8px;border-left:2px solid var(--border-light);margin:3px 0 3px 6px;}
  .rp-subs .rp-sub{font-size:10px;padding:2px 0;color:var(--text-muted);}
  .rp-subs .rp-sub.active{color:var(--accent);font-weight:600;}
  .rp-note{font-size:10px;color:var(--text-muted);line-height:1.45;margin-bottom:8px;}
  .rp-question{border:1px solid var(--border);border-radius:8px;padding:8px 9px;margin-bottom:8px;background:#fff;}
  .rp-question.active{border-color:var(--accent-light);background:var(--accent-light);}
  .rp-question.done{border-color:#d5f3e3;background:#f3fcf7;}
  .rp-q-title{font-size:11px;font-weight:700;color:var(--text-primary);line-height:1.35;margin-bottom:4px;}
  .rp-question.active .rp-q-title{color:var(--accent);}
  .rp-question.done .rp-q-title{color:#127a51;}
  .rp-q-why{font-size:10px;color:var(--text-muted);line-height:1.4;margin-bottom:6px;}
  .rp-q-list{padding-left:10px;border-left:2px solid var(--border-light);display:flex;flex-direction:column;gap:4px;}
  .rp-q-item{font-size:10px;color:var(--text-muted);line-height:1.35;}
  .rp-q-item.active{color:var(--accent);font-weight:600;}
  .rp-q-item.done{color:#127a51;}

  @media(max-width:1200px){.right-panel{display:none;}}
  @media(max-width:900px){.context-sidebar{display:none;}.chat-inner,.bottom-area{padding-left:14px;padding-right:14px;}}
  .mt-2{margin-top:6px;}.mt-3{margin-top:10px;}.hidden{display:none!important;}
</style>
</head>
<body>

<!-- LEFT CONTEXT PANEL -->
<div class="context-sidebar">
  <div class="ctx-head">
    <div class="ctx-orb"></div>
    <div>
      <div class="ctx-title" id="contextTitle">Contexto</div>
      <div class="ctx-sub" id="contextSubtitle">Fuente delimitada: panalbit.sqlite</div>
    </div>
  </div>
  <div id="contextMount"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="model-sel"><span class="ms-dot"></span> Asistente <span style="color:var(--text-muted);font-size:10px">&#9662;</span></div>
    </div>
    <div class="topbar-right">
      <span class="state-badge idle" id="globalBadge" style="display:none;">Listo</span>
      <button class="tb-btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>Buscar</button>
      <button class="tb-btn dark">+ Nuevo hilo</button>
    </div>
  </div>

  <!-- WELCOME SCREEN -->
  <div class="welcome" id="welcomeScreen">
    <div class="orb"></div>
    <h2>Que deseas <span>gestionar?</span></h2>
    <div class="welcome-input">
      <div class="welcome-box">
        <textarea rows="1" placeholder="Describe el problema o proceso que quieres automatizar..." id="welcomeInput"></textarea>
        <div class="welcome-box-footer">
          <button class="welcome-chip"><span class="chip-dot"></span> gammav1</button>
          <button class="send-btn" id="welcomeSend"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
        </div>
      </div>
    </div>
    <div class="welcome-examples">
      <div class="we-card" onclick="startFromExample('Muéstrame los 100 casos más urgentes de hoy')">Priorizar cartera<div class="we-icon">&#9634;</div></div>
      <div class="we-card" onclick="startFromExample('Analiza al deudor más prioritario')">Diagnóstico 360<div class="we-icon">&#9993;</div></div>
      <div class="we-card" onclick="startFromExample('Qué ejecutivos tienen más cartera atrasada')">Ejecutivos atrasados<div class="we-icon">&#9201;</div></div>
      <div class="we-card" onclick="startFromExample('Qué casos tienen datos incompletos')">Datos incompletos<div class="we-icon">&lt;/&gt;</div></div>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div class="chat-view" id="chatView">
    <div class="chat-scroll" id="chatScroll">
      <div class="chat-inner" id="chatInner">
        <div id="ownerBanner" class="owner-banner idle"><span class="dot"></span><span id="ownerLabel">Listo</span></div>
        <div id="messages"></div>
      </div>
    </div>
    <div class="bottom-area">
      <div class="action-strip" id="actionStrip" style="display:none;"></div>
      <div class="input-box">
        <textarea rows="1" placeholder="Escribe un mensaje..." id="chatInput"></textarea>
        <div class="input-box-f">
          <button class="ib-chip"><span class="chip-dot"></span> gammav1</button>
          <button class="send-btn" id="chatSend"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel" id="rightPanel">
  <h4 id="rightPanelTitle">Agenda de análisis</h4>
  <div id="rightPanelMount"></div>
</div>

<script>
const $=id=>document.getElementById(id);
const msgs=$('messages');

const state={
  sessionId:null,
  context:null,
  agenda:null,
  phase:'exploring',
  busy:false,
};

function scrollBottom(){setTimeout(()=>{$('chatScroll').scrollTop=$('chatScroll').scrollHeight;},50);}
function enterChat(){$('welcomeScreen').style.display='none';$('chatView').classList.add('visible');$('globalBadge').style.display='';}
function escapeAttr(s){return String(s).replace(/'/g,"\'");}
function escapeHtml(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');}
function makeBr(label,pct,val,accent){return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill ${accent?'accent':'dark'}" style="width:${pct}%">${pct>25?(val||''):''}</div></div><div class="bar-value">${val||pct+'%'}</div></div>`;}

function setPhase(phase){
  state.phase=phase||'exploring';
  const ob=$('ownerBanner'),gl=$('globalBadge'),ol=$('ownerLabel');
  const map={
    exploring:  ()=>{gl.className='state-badge analyzing';gl.textContent='Analizando';ob.className='owner-banner active';ol.textContent='Analizando';},
    synthesizing:()=>{gl.className='state-badge analyzing';gl.textContent='Sintetizando';ob.className='owner-banner active';ol.textContent='Sintetizando';},
    deciding:   ()=>{gl.className='state-badge analyzing';gl.textContent='Decidiendo';ob.className='owner-banner active';ol.textContent='Decidiendo';},
    acting:     ()=>{gl.className='state-badge idle';gl.textContent='Ejecutando';ob.className='owner-banner idle';ol.textContent='Ejecutando';},
    done:       ()=>{gl.className='state-badge done';gl.textContent='Completado';ob.className='owner-banner idle';ol.textContent='Completado';}
  };
  (map[state.phase]||map.exploring)();
}

function addMsg(cls,html){
  const div=document.createElement('div');
  if(cls==='user'){
    div.className='msg user-msg';
    div.innerHTML=`<div class="msg-header"><span class="msg-name">Tu</span><div class="msg-avatar user">T</div></div><div class="msg-body"><div class="user-bubble">${html}</div></div>`;
  } else {
    div.className='msg';
    div.innerHTML=`<div class="msg-header"><div class="msg-avatar ai"></div></div><div class="msg-body">${html}</div>`;
  }
  msgs.appendChild(div);scrollBottom();
}

function addTyping(){
  const div=document.createElement('div');div.id='typingMsg';div.className='msg';
  div.innerHTML=`<div class="msg-header"><div class="msg-avatar ai"></div></div><div class="msg-body"><span class="typing-dots"><span>.</span><span>.</span><span>.</span></span></div>`;
  msgs.appendChild(div);scrollBottom();
}
function removeTyping(){const t=$('typingMsg');if(t)t.remove();}

function renderResponse(r){
  let html='';
  if(r.text) html+=`<div style="font-size:14px;color:var(--text-secondary);line-height:1.7;">${r.text}</div>`;
  if(r.bars&&r.bars.length) html+=`<div class="a-card mt-2"><div class="a-card-b">${r.bars.map(b=>makeBr(b.label,b.pct,b.val,b.accent)).join('')}</div></div>`;
  if(r.metrics&&r.metrics.length) html+=`<div class="m-grid mt-2">${r.metrics.map(m=>`<div class="m-card"><div class="mv">${m.value}</div><div class="ml">${m.label}</div></div>`).join('')}</div>`;
  if(r.table&&r.table.rows&&r.table.rows.length){
    html+=`<div class="a-card mt-2">${r.table.header?`<div class="a-card-h">${r.table.header}</div>`:''}<div class="a-card-b"><table class="d-table">${r.table.rows.map(row=>`<tr>${row.map((c,i)=>`<td${i===0?' class="val"':''}>${c}</td>`).join('')}</tr>`).join('')}</table></div></div>`;
  }
  return html;
}

function normalizeActions(actions){
  let items=Array.isArray(actions)?actions.filter(a=>a&&a.label):[];
  const hasSeguir=items.some(a=>a.label==='Seguir analizando');
  if(!hasSeguir) items.unshift({label:'Seguir analizando'});
  items=items.slice(0,3);
  while(items.length<3){
    const fallback=[
      {label:'Actuar con la información disponible'},
      {label:'Pausar este caso', muted:true}
    ].find(f=>!items.some(a=>a.label===f.label));
    if(fallback) items.push(fallback); else break;
  }
  let primaryIndex=items.findIndex(a=>a.primary);
  if(primaryIndex===-1){
    primaryIndex=items.findIndex(a=>a.label!=='Seguir analizando');
    if(primaryIndex===-1) primaryIndex=0;
  }
  items=items.map((a,i)=>({...a, primary:i===primaryIndex, muted:i!==primaryIndex && !!a.muted}));
  return items.slice(0,3);
}

function renderActions(actions){
  const strip=$('actionStrip');
  const normalized=normalizeActions(actions);
  strip.innerHTML=normalized.map(a=>{
    const cls=a.primary?'primary':(a.muted?'muted':'');
    return `<button class="action-btn ${cls}" onclick="handleAction('${escapeAttr(a.label)}')">${a.label}</button>`;
  }).join('');
  strip.style.display='flex';
}

function fmtMoney(value){
  const n=Number(value||0);
  if(!Number.isFinite(n)) return '0';
  return n.toLocaleString('es-CL',{maximumFractionDigits:0});
}

function agendaGroupState(group){
  if(!group||!Array.isArray(group.items)) return 'pending';
  if(group.items.every(item=>item.status==='done')) return 'done';
  if(group.items.some(item=>item.status==='active')) return 'active';
  return 'pending';
}

function activeSubIndexForGroup(group){
  return group?.items?.findIndex(item=>item.status==='active')??-1;
}

function renderRightPanelAgenda(){
  const mount=$('rightPanelMount');
  if(!mount) return;
  $('rightPanelTitle').textContent=state.context?.view==='portfolio'?'Agenda gerencial':'Agenda de análisis';
  if(!state.agenda||!state.agenda.length){
    mount.innerHTML=`<div class="rp-note">La IA generará una agenda de preguntas al iniciar el análisis detallado. Luego, cada “Seguir analizando” profundizará una pregunta concreta.</div>`;
    return;
  }
  mount.innerHTML=`<div class="rp-note">La agenda guía el análisis como lo haría alguien de cobranzas: primero foco, luego urgencia y finalmente acción.</div>`+state.agenda.map((group)=>{
    const st=agendaGroupState(group);const activeSub=activeSubIndexForGroup(group);
    return `<div class="rp-question ${st}"><div class="rp-q-title">${group.title}</div><div class="rp-q-why">${group.why}</div><div class="rp-q-list">${group.items.map((item,itemIdx)=>{const cls=item.status==='done'?'done':(itemIdx===activeSub&&st==='active'?'active':'');return `<div class="rp-q-item ${cls}">${item.text}</div>`;}).join('')}</div></div>`;
  }).join('');
}

async function api(url, options={}){
  const response=await fetch(url,{headers:{'Content-Type':'application/json',...(options.headers||{})},...options});
  const data=await response.json().catch(()=>({error:'Respuesta inválida del servidor'}));
  if(!response.ok) throw new Error(data.error||`HTTP ${response.status}`);
  return data;
}

function applyEnvelope(payload){
  if(payload.context){
    state.context=payload.context;
    renderContextSidebar(state.context);
  }
  if(payload.session_id) state.sessionId=payload.session_id;
  if(payload.agenda) state.agenda=payload.agenda;
  if(payload.phase) state.phase=payload.phase;
  renderRightPanelAgenda();
}

async function bootstrap(){
  try{
    const payload=await api('/api/bootstrap');
    applyEnvelope(payload);
    setPhase(payload.phase||'exploring');
  }catch(err){
    $('contextMount').innerHTML=`<div class="ctx-section"><div class="ctx-foot">No pude cargar el contexto: ${escapeHtml(err.message)}</div></div>`;
    $('rightPanelMount').innerHTML=`<div class="rp-note">No pude inicializar la sesión.</div>`;
  }
}

async function sendChat(text){
  const prompt=String(text||'').trim();
  if(!prompt||state.busy||!state.sessionId)return;
  state.busy=true;
  $('actionStrip').style.display='none';
  addMsg('user',escapeHtml(prompt));
  addTyping();
  try{
    const payload=await api('/api/chat',{method:'POST',body:JSON.stringify({session_id:state.sessionId,text:prompt})});
    removeTyping();
    applyEnvelope(payload);
    if(payload.response?.phase) setPhase(payload.response.phase);
    const html=renderResponse(payload.response||{});
    addMsg('ai',html);
    if(payload.response?.actions?.length) renderActions(payload.response.actions);
  }catch(err){
    removeTyping();
    addMsg('ai',`<div style="font-size:14px;color:var(--text-secondary);line-height:1.7;">${escapeHtml(err.message)}</div>`);
  }finally{
    state.busy=false;
  }
}

async function submitInitialPrompt(text){
  const prompt=String(text||'').trim();
  if(!prompt||state.busy)return;
  enterChat();
  setPhase('exploring');
  await sendChat(prompt);
}

async function submitChatPrompt(text){
  const prompt=String(text||'').trim();
  if(!prompt||state.busy)return;
  await sendChat(prompt);
}

async function configureGroqKey(){
  const entered=window.prompt('Ingresa tu Groq API key para guardarla en esta sesión:', '');
  if(!entered) return null;
  return api('/api/config/groq',{method:'POST',body:JSON.stringify({session_id:state.sessionId,api_key:String(entered).trim()})});
}

async function handleAction(label){
  if(state.busy||!state.sessionId)return;
  if(label==='Ingresar API key'){
    state.busy=true;
    $('actionStrip').style.display='none';
    addMsg('user',escapeHtml(label));
    addTyping();
    try{
      const payload=await configureGroqKey();
      removeTyping();
      if(!payload){
        addMsg('ai','<div style="font-size:14px;color:var(--text-secondary);line-height:1.7;">No guardé ninguna key. Si quieres, puedes intentarlo otra vez.</div>');
        renderActions([{label:'Seguir analizando',muted:true},{label:'Ingresar API key',primary:true},{label:'Pausar este caso'}]);
      } else {
        applyEnvelope(payload);
        if(payload.response?.phase) setPhase(payload.response.phase);
        addMsg('ai',renderResponse(payload.response||{}));
        if(payload.response?.actions?.length) renderActions(payload.response.actions);
      }
    }catch(err){
      removeTyping();
      addMsg('ai',`<div style="font-size:14px;color:var(--text-secondary);line-height:1.7;">${escapeHtml(err.message)}</div>`);
    }finally{
      state.busy=false;
    }
    return;
  }
  state.busy=true;
  $('actionStrip').style.display='none';
  addMsg('user',escapeHtml(label));
  addTyping();
  try{
    const payload=await api('/api/action',{method:'POST',body:JSON.stringify({session_id:state.sessionId,label})});
    removeTyping();
    applyEnvelope(payload);
    if(payload.response?.phase) setPhase(payload.response.phase);
    addMsg('ai',renderResponse(payload.response||{}));
    if(payload.response?.actions?.length) renderActions(payload.response.actions);
  }catch(err){
    removeTyping();
    addMsg('ai',`<div style="font-size:14px;color:var(--text-secondary);line-height:1.7;">${escapeHtml(err.message)}</div>`);
  }finally{
    state.busy=false;
  }
}

function startFromExample(text){$('welcomeInput').value=text||'';submitInitialPrompt(text);}
$('welcomeSend').onclick=()=>{const v=$('welcomeInput').value;$('welcomeInput').value='';submitInitialPrompt(v);};
$('welcomeInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();const v=$('welcomeInput').value;$('welcomeInput').value='';submitInitialPrompt(v);}});
$('chatSend').onclick=()=>{const v=$('chatInput').value;$('chatInput').value='';submitChatPrompt(v);};
$('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();const v=$('chatInput').value;$('chatInput').value='';submitChatPrompt(v);}});

window.handleAction=handleAction;
window.startFromExample=startFromExample;

renderRightPanelAgenda();
bootstrap();
</script>
