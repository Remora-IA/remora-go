axioms:
  axiom-all-debug-routed-to-delegation:
    description: "Todos los comandos 'remora flow ...' que no son debug puro se delegan automáticamente al flujo CLI canónico"
    scope: remora-cli
    cpgql_query: |
      cpg.call.name("Command").where(_.argument.code("flujo")).code.l
    status: clean
    violations: []
    auto_detected: true

  axiom-all-debug-routed-to-delegation-v2:
    description: "El caso 'args[0]==flow && args[1]==debug' NO está capturado localmente - se delega a flujo canónico"
    scope: remora-cli
    cpgql_query: |
      cpg.method.name("handleFlowWorkbench").ast.isCall.code(".*debug.*").l
    status: clean
    violations: []
    auto_detected: true

  axiom-channel-whitelist-enforced:
    description: "channel SIEMPRE valida comandos contra whitelist antes de ejecutar"
    scope: channel
    cpgql_query: |
      cpg.method.name("ExecuteCommand").controlStructure.condition.code(".*IsCommandAllowed.*").l
    status: clean
    violations: []
    auto_detected: true

  axiom-all-flows-persist-artifacts:
    description: "Todo flujo que ejecuta nodos persiste artifacts antes de completar"
    scope: remora-flujo
    cpgql_query: |
      cpg.method.name("runFlowManifest").callee.name("recordNodeArtifacts").l
    status: clean
    violations: []
    auto_detected: true

  axiom-auth-required-for-business-ops:
    description: "Todas las operaciones de negocio requieren autenticación válida"
    scope: remora-flujo
    cpgql_query: |
      cpg.method.name("requireCurrentUser").callIn.ast.isControlStructure.code(".*401.*").l
    status: clean
    violations: []
    auto_detected: true

  axiom-handleflowdebug-missing:
    description: "handleFlowDebug NO EXISTE en remora-cli - comando 'remora flow debug' se delega automáticamente"
    scope: remora-cli
    cpgql_query: |
      cpg.method.name("handleFlowDebug").l
    status: violated
    violations:
      - symbol: handleFlowDebug
        file: remora-cli/cmd/remora/flow_workbench.go
        line: 0
        detail: "Función prometida en printFlowWorkbenchUsage() línea 920 pero no implementada"
    auto_detected: true

  axiom-client-stream-missing:
    description: "Client.stream() NO EXISTE en remora-cli - streaming SSE no disponible localmente"
    scope: remora-cli
    cpgql_query: |
      cpg.method.name("stream").where(_.receiver.typeFullName(".*Client.*")).l
    status: violated
    violations:
      - symbol: Client.stream
        file: remora-cli/cmd/remora/main.go
        line: 0
        detail: "Streaming SSE no disponible en CLI - existe en remora-flujo flowWorkbenchClient.stream()"
    auto_detected: true

