gaps:
- symbol: gap-1
  component: remora-cli
  status: PARCIAL
  detail: '''remora flow run'', ''flow compile'', ''flow install'', ''flow replay'' no tienen handlers nativos

    en remora-cli. Se delegan a canonicalFlowWorkbenchCommand() [flow_workbench.go:895] que

    busca el binario ''flujo'' en PATH. Si no disponible: stderr ''flow workbench canonico no

    disponible; usa flujo flow ...'', exit 1.

    '
- symbol: gap-2
  component: remora-flujo
  status: AUSENTE
  detail: 'El frontend no expone el timeline de un run ni las dependencies de un flow. Solo disponibles

    via CLI con ''remora flow debug trace'' y ''remora flow debug dependencies''. No hay componente

    UI en static/index.html que consuma GET /api/v1/flows/runs/{id} con visualizacion de

    timeline o dependency graph.

    '
- symbol: gap-3
  component: channel
  status: INCOMPLETO
  detail: 'Channel no tiene modo dev sin autenticacion. Sin API keys el servidor falla con

    log.Fatal("At least one API key is required") [cmd/channel/main.go:42]. El check de

    len(keys)==0 es incondicional; no hay modo bypass para desarrollo local.

    '
- symbol: gap-4
  component: remora-cli
  status: BUG
  detail: 'printDebugUsage() [flow_workbench.go:259] muestra ''remora debug frameworks'' (sin ''flow''

    intermedio). El handler real requiere ''remora flow debug'' porque el dispatcher esta en

    handleFlowWorkbench() [flow_workbench.go:244]. Siguiendo el ejemplo impreso, el comando

    falla.

    '
- symbol: gap-5
  component: remora-flujo
  status: AUSENTE
  detail: 'El frontend flows-execution-view no tiene panel de resultado detallado. El resultado se

    muestra como conversacion de chat pero no hay panel de timeline, handoffs ni produces

    equivalente al output de printRunTrace() en la CLI.

    '
- symbol: gap-6
  component: channel
  status: BUG
  detail: 'orchestrator usa paths hardcodeados ''/Users/alcless_a1234_cursor/remora-go/'' en

    absPathsFromPorts() [orchestrator/main.go:225] y resolveInputs() [orchestrator/main.go:243]

    en lugar del --base-dir real. En otro entorno los paths no existen y los comandos fallan.

    '
- symbol: gap-7
  component: remora-flujo
  status: AUSENTE
  detail: 'El frontend no expone gestion de vault ni credenciales SMTP. Los endpoints handleSMTPCheck,

    handleHostingConnect, handleSMTPImport, handleSMTPDelete [flow_smtp.go] existen en la API

    pero no tienen UI asociada en el canvas principal. El usuario debe usar vault CLI o llamar

    directamente al endpoint.

    '
